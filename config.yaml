# Smart ICU Assistant Configuration

# Data paths (relative to project root)
DATA_DIR: data
OUTPUT_DIR: output
MODEL_DIR: models

# Preprocessing parameters
TIME_WINDOWS:
  mortality: [6, 12, 24]
  sepsis: [6, 12, 24]
  aki: [24, 48]
  vasopressor: [6, 12]
  ventilation: [6, 12, 24]

# Feature extraction
VITAL_SIGNS:
  - heartrate
  - sysbp
  - diasbp
  - meanbp
  - resprate
  - tempc
  - spo2
  - glucose
  - gcs
  - urine_output

LAB_TESTS:
  - lactate
  - creatinine
  - wbc
  - hemoglobin
  - platelets
  - bicarbonate
  - chloride

# ── Model Parameters ─────────────────────────────────────────────────────────

LSTM_CONFIG:
  hidden_size: 128
  num_layers: 2
  dropout: 0.3
  bidirectional: true
  learning_rate: 0.001
  batch_size: 64
  epochs: 50

LOSS_FUNCTION: focal # options: bce, focal

TCN_CONFIG:
  num_channels: [64, 128, 256]
  kernel_size: 3
  dropout: 0.3
  learning_rate: 0.001

CATBOOST_CONFIG:
  iterations: 300
  depth: 6
  learning_rate: 0.1
  early_stopping_rounds: 20
  task_type: CPU

# XGBoost 2.x API (gpu_hist deprecated → use device + hist)
# Updated for imbalanced clinical data: deeper trees, more estimators,
# regularization via min_child_weight/gamma/colsample, early stopping
XGBOOST_CONFIG:
  max_depth: 8              # was 6 — deeper trees capture complex interactions
  learning_rate: 0.1
  n_estimators: 300         # was 100 — more trees with early stopping
  subsample: 0.8
  min_child_weight: 3       # regularization — prevents splits on tiny leaf groups
  colsample_bytree: 0.8     # feature subsampling — reduces overfitting
  gamma: 0.1                # minimum loss reduction for split — prunes trivial splits
  tree_method: hist
  device: cuda
  early_stopping_rounds: 20 # stop if val AUC doesn't improve for 20 rounds

# LightGBM — leaf-wise growth provides different perspective to XGBoost
# Handles imbalanced data differently, adding model diversity to ensemble
LIGHTGBM_CONFIG:
  max_depth: -1             # no limit — controlled by num_leaves
  num_leaves: 63            # max leaves per tree (2^6 - 1)
  learning_rate: 0.05
  n_estimators: 300
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
  device: cpu               # LightGBM GPU requires separate build; use 'gpu' if built
  early_stopping_rounds: 20

# Transformer config
# NOTE: Transformers need a LOWER learning rate than LSTMs.
# At lr=0.001 (LSTM default), attention scores overflow FP16 range after ~5 epochs → NaN.
# lr=0.0001 with norm_first=True keeps training stable under AMP.
TRANSFORMER_CONFIG:
  d_model: 128
  nhead: 8
  num_layers: 3
  dim_feedforward: 256
  dropout: 0.3
  learning_rate: 0.0001     # 10× lower than LSTM (0.001) — standard for Transformers

# TabTransformer — column-wise attention over features + temporal pooling
# Treats each of 81 features as a separate entity with learned embeddings,
# then applies attention to discover feature interactions per timestep
TABTRANSFORMER_CONFIG:
  d_model: 64
  nhead: 4
  num_layers: 2
  dropout: 0.3
  learning_rate: 0.0001

# Temporal Fusion Transformer — designed for multivariate time-series
# with variable selection networks and interpretable temporal attention.
# Best for tasks where trajectory patterns matter (sepsis, AKI)
TFT_CONFIG:
  d_model: 64
  nhead: 4
  num_layers: 1
  dropout: 0.3
  learning_rate: 0.0001

# ── Per-Task Overrides ────────────────────────────────────────────────────────
# Override model configs for specific tasks that show overfitting or need
# specialized model selection. Keys match predictor TASK_NAME values.
TASK_OVERRIDES:
  vasopressor:
    dropout: 0.5           # severe overfitting: train=1.64, val=2.97 (1.8× gap)
  sepsis:
    dropout: 0.5           # moderate overfitting: train=0.82, val=1.38 (1.7× gap)
    # Uncomment to add TFT for sepsis (trajectory matters for SIRS criteria):
    # models: ['lstm', 'transformer', 'tft', 'xgboost', 'lightgbm']
  aki:
    # Uncomment to add TFT for AKI (rising creatinine trajectory):
    # models: ['lstm', 'transformer', 'tft', 'xgboost', 'lightgbm']
    dropout: 0.3           # default — AKI doesn't overfit as badly

# ── GPU Training Config ──────────────────────────────────────────────────────
# Tuned for RTX 3050 Laptop 4GB VRAM
GPU_CONFIG:
  batch_size: 64
  grad_accum_steps: 1
  use_amp: true
  pin_memory: true
  num_workers: 0
  prefetch_factor: null
  persistent_workers: false

# Alert thresholds
RISK_THRESHOLDS:
  low: 0.3
  medium: 0.6
  high: 0.8

# Clinical definitions
# SEPSIS_CRITERIA uses K/µL (thousands per µL) — MIMIC-III stores WBC in K/µL
SEPSIS_CRITERIA:
  temp_high: 38.3
  temp_low: 36.0
  hr_threshold: 90
  rr_threshold: 20
  wbc_high: 12       # K/µL (was 12000 — corrected to match predictor code units)
  wbc_low: 4         # K/µL (was 4000)

AKI_KDIGO_STAGES:
  stage1_cr_increase: 0.3  # mg/dL
  stage1_cr_ratio: 1.5
  stage2_cr_ratio: 2.0
  stage3_cr_ratio: 3.0

# Ventilation detection itemids (from D_ITEMS)
VENTILATION_ITEMIDS:
  - 225792  # Invasive Ventilation
  - 225794  # Non-invasive Ventilation
  - 226260  # Mechanically Ventilated

# Ventilation ICD-9 procedure codes
VENTILATION_ICD_CODES:
  - "9670"
  - "9671"
  - "9672"
  - "9604"
  - "9390"

# Vasopressor itemids for INPUTEVENTS_MV
VASOPRESSOR_ITEMIDS:
  - 221906  # Norepinephrine
  - 221289  # Epinephrine
  - 222315  # Vasopressin
  - 221749  # Phenylephrine
  - 221662  # Dopamine

# Urine output itemids for AKI (from OUTPUTEVENTS)
URINE_OUTPUT_ITEMIDS:
  - 40055   # Urine Out Foley
  - 43175   # Urine
  - 40069   # Urine Out Void
  - 40094   # Urine Out Condom Cath
  - 226559  # Foley
  - 226560  # Void
  - 226561  # Condom Cath
  - 227489  # GU Irrigant/Round

# Early stopping config
EARLY_STOPPING:
  patience: 20
  min_delta: 0.0001
  nan_abort_epochs: 5

# LR scheduler + training enhancements
SCHEDULER:
  type: plateau             # 'plateau' (ReduceLROnPlateau) or 'cosine' (CosineAnnealingLR)
  warmup_epochs: 3          # linear warmup (Transformer only)
  factor: 0.5               # ReduceLROnPlateau: multiply LR by this on plateau
  patience: 5               # ReduceLROnPlateau: epochs to wait before reducing
  label_smoothing: 0.05     # soften targets 0→ε, 1→(1-ε)

# Ensemble config
ENSEMBLE:
  enabled: true             # AUROC²-weighted averaging + stacking meta-learner