# Smart ICU Assistant Configuration
# ─────────────────────────────────────────────────────────────────────────────
# GPU TARGET: NVIDIA A100-SXM4-80GB
#   • 80 GB HBM2e  — batch sizes tuned to fill ~60 GB, leaving headroom
#   • 312 TFLOPS BF16 / 77 TFLOPS FP32
#   • NVLink + SXM form factor → peak memory bandwidth 2 TB/s
#   • Use BF16 (not FP16) — A100 has native BF16 support, no loss scaling needed
# ─────────────────────────────────────────────────────────────────────────────

DATA_DIR: data
OUTPUT_DIR: output
MODEL_DIR: models

TIME_WINDOWS:
  mortality: [6, 12, 24]
  sepsis: [6, 12, 24]
  aki: [24, 48]
  vasopressor: [6, 12]
  ventilation: [6, 12, 24]
  hypotension: [1, 3, 6]

VITAL_SIGNS:
  - heartrate
  - sysbp
  - diasbp
  - meanbp
  - resprate
  - tempc
  - spo2
  - glucose

LAB_TESTS:
  - lactate
  - creatinine
  - wbc
  - hemoglobin
  - platelets
  - bicarbonate
  - chloride

# ── Model parameters ──────────────────────────────────────────────────────────

LSTM_CONFIG:
  hidden_size: 256        # was 128 — A100 has headroom, wider = better
  num_layers: 3           # was 2
  dropout: 0.3
  bidirectional: true
  learning_rate: 0.001
  batch_size: 2048        # was 64 — A100 80 GB handles this trivially
  epochs: 50

TRANSFORMER_CONFIG:
  d_model: 256            # was 128
  nhead: 8
  num_layers: 4           # was 3
  dim_feedforward: 512    # was 256
  dropout: 0.3

# NOTE: TCN removed — BatchNorm1d collapses under AMP with imbalanced labels.

XGBOOST_CONFIG:
  max_depth: 6
  learning_rate: 0.1
  n_estimators: 100
  subsample: 0.8
  tree_method: hist
  device: cuda

# ── A100 GPU training config ──────────────────────────────────────────────────
# Previous config was tuned for RTX 3050 4 GB. A100 changes:
#
#   batch_size        32  → 2048   64x larger — saturates HBM2e bandwidth
#   grad_accum_steps   2  → 1      no simulation needed at batch 2048
#   precision        fp16 → bf16   A100 native BF16, no loss scaler required
#   num_workers        2  → 16     A100 nodes have 32-64 CPU cores
#   prefetch_factor    -  → 4      pipeline 4 batches ahead per worker
#   persistent_workers -  → true   avoid worker respawn (~5 s saved per epoch)
#   torch_compile      -  → true   20-40% kernel fusion speedup on A100
#   cudnn_benchmark    -  → true   auto-tune kernels on first batch (~30 s once)

GPU_CONFIG:
  batch_size: 2048
  grad_accum_steps: 1
  precision: bf16             # BF16 preferred on A100 (no GradScaler needed)
  pin_memory: true
  num_workers: 16
  prefetch_factor: 4
  persistent_workers: true
  torch_compile: true         # torch.compile mode='reduce-overhead'
  cudnn_benchmark: true
  non_blocking_transfer: true

RISK_THRESHOLDS:
  low: 0.3
  medium: 0.6
  high: 0.8

SEPSIS_CRITERIA:
  temp_high: 38.3
  temp_low: 36.0
  hr_threshold: 90
  rr_threshold: 20
  wbc_high: 12000
  wbc_low: 4000

HYPOTENSION_THRESHOLD: 65
AKI_KDIGO_STAGES:
  stage1_cr_increase: 0.3
  stage1_cr_ratio: 1.5
  stage2_cr_ratio: 2.0
  stage3_cr_ratio: 3.0

TRANSFORMER_CONFIG:
  d_model: 256
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.3

