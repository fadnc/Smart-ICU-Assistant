# Smart ICU Assistant Configuration

# Data paths (relative to project root)
DATA_DIR: data
OUTPUT_DIR: output
MODEL_DIR: models

# Preprocessing parameters
TIME_WINDOWS:
  mortality: [6, 12, 24]
  sepsis: [6, 12, 24]
  aki: [24, 48]
  vasopressor: [6, 12]
  ventilation: [6, 12, 24]
  hypotension: [1, 3, 6]

# Feature extraction
VITAL_SIGNS:
  - heartrate
  - sysbp
  - diasbp
  - meanbp
  - resprate
  - tempc
  - spo2
  - glucose

LAB_TESTS:
  - lactate
  - creatinine
  - wbc
  - hemoglobin
  - platelets
  - bicarbonate
  - chloride

# Model parameters
LSTM_CONFIG:
  hidden_size: 128
  num_layers: 2
  dropout: 0.3
  bidirectional: true
  learning_rate: 0.001
  batch_size: 64
  epochs: 50

# NOTE: TCN_CONFIG removed. TCN has been dropped from the codebase.
# nn.BatchNorm1d collapses under FP16 AMP with imbalanced ICU labels
# (rare events such as vasopressor, AKI Stage 3, sepsis), producing NaN
# loss from epoch 2-7 on every task and wasting ~3h per task per run.
# Active models: LSTM, Transformer, XGBoost.

# FIX: Updated to XGBoost 2.x API.
#   - Removed: gpu_id (use device instead)
#   - Removed: tree_method: gpu_hist (deprecated)
#   - Added:   device: cuda (replaces both gpu_id and gpu_hist)
#   - tree_method: hist works for both CPU and GPU in XGBoost 2.x
XGBOOST_CONFIG:
  max_depth: 6
  learning_rate: 0.1
  n_estimators: 100
  subsample: 0.8
  tree_method: hist      # hist works for CPU and GPU (gpu_hist deprecated in 2.0)
  device: cuda           # replaces gpu_id + gpu_hist; use 'cpu' if no GPU

# GPU training config (tuned for RTX 3050 Laptop 4GB VRAM)
#
# Why num_workers=0 on Windows:
#   PyTorch DataLoader multiprocessing uses 'spawn' on Windows, which tries to
#   pickle the entire DataLoader into a child process. This requires the script
#   entry point to be guarded by if __name__=='__main__', which main_pipeline.py
#   is not (it is imported and called as a module). Result: KeyboardInterrupt /
#   pickle crash on the first epoch. training.py detects Windows at runtime and
#   forces num_workers=0 regardless of this value, so the pipeline won't crash.
#   The bottleneck is instead solved by prefetch_factor + persistent_workers
#   (which work in single-process mode) and a larger batch size.
#
# GPU utilization target: 85-95% (was 46% with batch=32, workers=0, no prefetch)
GPU_CONFIG:
  batch_size: 4096          # 6× larger — fills 4GB VRAM comfortably with LSTM/Transformer
                           # (was 32; GPU was only 0.2/4.0 GB used = severely underloaded)
  grad_accum_steps: 1      # No longer needed — batch=128 is already the effective size
                           # (was 2 with batch=32 to simulate batch=64)
  use_amp: true            # FP16 mixed precision — keep ON, halves VRAM and speeds matmul
  pin_memory: true         # Faster CPU→GPU transfer via pinned (page-locked) memory
  num_workers: 0           # Must be 0 on Windows (see note above). training.py enforces this.
  prefetch_factor: null    # Disabled when num_workers=0 (would raise ValueError otherwise)
  persistent_workers: false # Disabled when num_workers=0

# Alert thresholds
RISK_THRESHOLDS:
  low: 0.3
  medium: 0.6
  high: 0.8

# Clinical definitions
SEPSIS_CRITERIA:
  temp_high: 38.3
  temp_low: 36.0
  hr_threshold: 90
  rr_threshold: 20
  wbc_high: 12000
  wbc_low: 4000

HYPOTENSION_THRESHOLD: 65  # MAP in mmHg
AKI_KDIGO_STAGES:
  stage1_cr_increase: 0.3  # mg/dL
  stage1_cr_ratio: 1.5
  stage2_cr_ratio: 2.0
  stage3_cr_ratio: 3.0

# Transformer model config (for sepsis prediction)
TRANSFORMER_CONFIG:
  d_model: 128
  nhead: 8
  num_layers: 3
  dim_feedforward: 256
  dropout: 0.3

# Ventilation detection itemids (from D_ITEMS)
VENTILATION_ITEMIDS:
  - 225792  # Invasive Ventilation
  - 225794  # Non-invasive Ventilation
  - 226260  # Mechanically Ventilated

# Ventilation ICD-9 procedure codes
VENTILATION_ICD_CODES:
  - "9670"
  - "9671"
  - "9672"
  - "9604"
  - "9390"

# Vasopressor itemids for INPUTEVENTS_MV
VASOPRESSOR_ITEMIDS:
  - 221906  # Norepinephrine
  - 221289  # Epinephrine
  - 222315  # Vasopressin
  - 221749  # Phenylephrine
  - 221662  # Dopamine

# Urine output itemids for AKI (from OUTPUTEVENTS)
URINE_OUTPUT_ITEMIDS:
  - 40055   # Urine Out Foley
  - 43175   # Urine
  - 40069   # Urine Out Void
  - 40094   # Urine Out Condom Cath
  - 226559  # Foley
  - 226560  # Void
  - 226561  # Condom Cath
  - 227489  # GU Irrigant/Round

# Early stopping config
# FIX: Increased patience from 10 → 20, added min_delta to prevent stopping
# before the model has meaningfully converged. With 980K sequences and
# batch_size=32, each epoch is long — 10 epochs was too aggressive.
EARLY_STOPPING:
  patience: 20       # was 10
  min_delta: 0.0001  # minimum loss improvement to reset patience counter