<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart ICU Assistant</title>
    <script src="/static/js/react.min.js"></script>
    <script src="/static/js/react-dom.min.js"></script>
    <script src="/static/js/prop-types.min.js"></script>
    <script src="/static/js/babel.min.js"></script>
    <script src="/static/js/recharts.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            /* ── Backgrounds (layered depth) ── */
            --bg: #06090f;
            --bg2: #0a1018;
            --bg3: #0f1824;
            --panel: #111e30;
            /* ── Borders ── */
            --border: #1a2d47;
            --border2: #24406a;
            /* ── Text hierarchy ── */
            --text: #dce8f7;
            --text1: #dce8f7;
            --text2: #8ba4c4;
            --text3: #456080;
            /* ── Accent spectrum ── */
            --accent: #22d3ee;
            --accent2: #0ea5c9;
            --cyan: #22d3ee;
            /* ── Semantic colors ── */
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f43f5e;
            --orange: #f97316;
            --purple: #a78bfa;
            /* ── Fonts ── */
            --mono: 'Share Tech Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #root {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 13px;
            overflow: hidden;
        }

        /* scrollbars */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding: 10px 20px;
            min-height: 52px;
            background: linear-gradient(90deg, var(--bg2) 0%, #0c1520 50%, var(--bg2) 100%);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-logo {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-logo span {
            color: var(--text3);
        }

        .header-time {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text3);
            margin-left: auto;
        }

        .header-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2px;
            padding: 0 20px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab {
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text3);
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            transition: all .15s;
        }

        .tab:hover {
            color: var(--text2);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
        }

        /* Main layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-search {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 7px 10px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 12px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent2);
        }

        .search-input::placeholder {
            color: var(--text3);
        }

        .filter-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .filter-btn {
            flex: 1;
            padding: 4px 6px;
            font-size: 10px;
            border: 1px solid var(--border2);
            border-radius: 3px;
            background: var(--bg3);
            color: var(--text3);
            cursor: pointer;
            font-family: var(--sans);
            transition: all .15s;
        }

        .filter-btn:hover {
            border-color: var(--accent2);
            color: var(--text);
        }

        .filter-btn.active-high {
            background: rgba(255, 59, 92, .15);
            border-color: var(--red);
            color: var(--red);
        }

        .filter-btn.active-medium {
            background: rgba(255, 140, 0, .15);
            border-color: var(--orange);
            color: var(--orange);
        }

        .filter-btn.active-low {
            background: rgba(0, 229, 160, .15);
            border-color: var(--green);
            color: var(--green);
        }

        .patient-list {
            flex: 1;
            overflow-y: auto;
        }

        .patient-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background .1s;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .patient-item:hover {
            background: rgba(0, 212, 255, .04);
        }

        .patient-item.selected {
            background: rgba(0, 212, 255, .08);
            border-left: 2px solid var(--accent);
        }

        .pi-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pi-id {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
        }

        .pi-name {
            font-size: 11px;
            color: var(--text2);
        }

        .pi-diag {
            font-size: 10px;
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .risk-badge {
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            font-family: var(--mono);
        }

        .risk-HIGH {
            background: rgba(255, 59, 92, .2);
            color: var(--red);
            border: 1px solid rgba(255, 59, 92, .4);
        }

        .risk-MEDIUM {
            background: rgba(255, 140, 0, .2);
            color: var(--orange);
            border: 1px solid rgba(255, 140, 0, .4);
        }

        .risk-LOW {
            background: rgba(0, 229, 160, .2);
            color: var(--green);
            border: 1px solid rgba(0, 229, 160, .4);
        }

        .score-bar-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-bar {
            flex: 1;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 1px;
        }

        /* ── Assessment tab styles ─────────────────────── */
        .assess-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 16px;
        }

        @media (max-width: 900px) {
            .assess-layout {
                grid-template-columns: 1fr;
            }
        }

        .assess-form {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            overflow-y: auto;
            max-height: calc(100vh - 130px);
        }

        .assess-results {
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            max-height: calc(100vh - 130px);
        }

        .input-section {
            margin-bottom: 16px;
        }

        .input-section-title {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .input-group label {
            font-size: 10px;
            color: var(--text3);
            font-family: var(--mono);
            letter-spacing: 0.5px;
        }

        .input-group input,
        .input-group select {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--text1);
            font-size: 13px;
            font-family: var(--mono);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
            outline: none;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .toggle-row label {
            font-size: 11px;
            color: var(--text2);
            flex: 1;
        }

        .toggle-switch {
            width: 36px;
            height: 20px;
            border-radius: 10px;
            background: var(--border);
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.on {
            background: var(--accent);
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: var(--text);
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch.on::after {
            transform: translateX(16px);
        }

        .assess-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--cyan), var(--accent2), var(--green));
            background-size: 200% 200%;
            animation: btnShimmer 3s ease infinite;
            border: none;
            border-radius: 6px;
            color: var(--bg);
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 2px 12px rgba(34, 211, 238, 0.2);
        }

        @keyframes btnShimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .assess-btn:hover {
            opacity: 0.9;
        }

        .assess-btn:active {
            transform: scale(0.98);
        }

        .assess-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .risk-gauge {
            background: linear-gradient(160deg, var(--panel) 0%, rgba(17, 30, 48, 0.9) 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .gauge-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .gauge-inner {
            font-family: var(--mono);
            font-size: 32px;
            font-weight: 700;
        }

        .gauge-label {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .result-card {
            background: linear-gradient(160deg, var(--panel) 0%, rgba(17, 30, 48, 0.85) 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            backdrop-filter: blur(4px);
        }

        .result-card-title {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 6px rgba(34, 211, 238, 0.15);
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
        }

        .result-label {
            font-size: 11px;
            color: var(--text2);
            width: 130px;
        }

        .result-bar {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .result-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .result-val {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text1);
            min-width: 40px;
            text-align: right;
        }

        .clinical-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 11px;
            border: 1px solid var(--border);
            background: var(--bg2);
        }

        .assess-alert {
            padding: 10px 14px;
            border-radius: 6px;
            border-left: 3px solid;
            margin-bottom: 6px;
        }

        .assess-alert.critical {
            border-color: var(--red);
            background: rgba(239, 68, 68, 0.08);
        }

        .assess-alert.warning {
            border-color: var(--orange);
            background: rgba(245, 158, 11, 0.08);
        }

        .assess-alert-cat {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .assess-alert-msg {
            font-size: 12px;
            color: var(--text2);
        }

        .assess-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text3);
            gap: 12px;
        }

        .assess-empty-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .score-val {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            min-width: 28px;
            text-align: right;
        }

        /* Content area */
        .content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Cards */
        .card {
            background: linear-gradient(135deg, var(--panel) 0%, rgba(17, 30, 48, 0.85) 100%);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }

        .card-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card-body {
            padding: 14px;
        }

        /* Grid layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Stat tile */
        .stat-tile {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 12px 14px;
        }

        .stat-label {
            font-size: 9px;
            color: var(--text3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: var(--mono);
            font-size: 22px;
            color: var(--text);
        }

        .stat-value.accent {
            color: var(--accent);
        }

        .stat-value.green {
            color: var(--green);
        }

        .stat-value.red {
            color: var(--red);
        }

        .stat-value.yellow {
            color: var(--yellow);
        }

        .stat-sub {
            font-size: 10px;
            color: var(--text3);
            margin-top: 2px;
        }

        /* Patient header */
        .pt-header {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }

        .pt-id-block {
            font-family: var(--mono);
        }

        .pt-icustay {
            font-size: 20px;
            color: var(--accent);
        }

        .pt-sub {
            font-size: 10px;
            color: var(--text3);
            margin-top: 2px;
        }

        .pt-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            flex: 1;
        }

        .pt-meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .pt-meta-label {
            font-size: 9px;
            color: var(--text3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .pt-meta-val {
            font-size: 13px;
            color: var(--text);
            font-weight: 500;
        }

        .composite-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 2px solid var(--border);
        }

        .cc-score {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 600;
        }

        .cc-label {
            font-size: 8px;
            color: var(--text3);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Prediction groups */
        .pred-group {
            margin-bottom: 12px;
        }

        .pred-group-title {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .pred-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .pred-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px 10px;
        }

        .pred-item-label {
            font-size: 9px;
            color: var(--text3);
            margin-bottom: 4px;
        }

        .pred-item-score {
            font-family: var(--mono);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .pred-mini-bar {
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
        }

        .pred-mini-fill {
            height: 100%;
            border-radius: 1px;
        }

        /* Charts */
        .chart-wrap {
            width: 100%;
            height: 180px;
        }

        /* Alerts */
        .alert-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-left: 3px solid var(--red);
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        .alert-item.medium {
            border-left-color: var(--orange);
        }

        .alert-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .alert-id {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
        }

        .alert-diag {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .alert-triggers {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .alert-trigger {
            padding: 2px 7px;
            border-radius: 2px;
            font-size: 9px;
            background: rgba(255, 59, 92, .12);
            border: 1px solid rgba(255, 59, 92, .3);
            color: var(--red);
            font-family: var(--mono);
        }

        /* SHAP */
        .shap-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
        }

        .shap-feature {
            width: 180px;
            font-size: 11px;
            color: var(--text2);
            font-family: var(--mono);
            flex-shrink: 0;
        }

        .shap-bar-wrap {
            flex: 1;
        }

        .shap-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .shap-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
        }

        .shap-val {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            min-width: 36px;
            text-align: right;
        }

        /* Empty state */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text3);
            gap: 8px;
        }

        .empty-icon {
            font-size: 32px;
            opacity: .3;
        }

        .empty-text {
            font-size: 12px;
            font-family: var(--mono);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
            color: var(--text3);
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 2px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin-right: 10px;
        }

        .boot-shell {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(0, 212, 255, .12), transparent 40%),
                linear-gradient(180deg, rgba(6, 15, 22, .96), rgba(8, 22, 31, .98));
            z-index: 10000;
            transition: opacity .35s ease, visibility .35s ease;
        }

        .boot-shell.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .boot-card {
            width: min(520px, 100%);
            padding: 24px;
            border: 1px solid rgba(0, 212, 255, .18);
            border-radius: 12px;
            background: rgba(7, 19, 28, .92);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
        }

        .boot-kicker {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--accent2);
            margin-bottom: 10px;
        }

        .boot-title {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .boot-stage {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text1);
            margin-bottom: 6px;
        }

        .boot-detail {
            font-size: 12px;
            color: var(--text3);
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .boot-progress {
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .06);
        }

        .boot-progress-fill {
            height: 100%;
            width: 8%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent2), var(--accent), #7af7ff);
            box-shadow: 0 0 18px rgba(0, 212, 255, .35);
            transition: width .45s ease;
        }

        .boot-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text3);
        }

        .boot-error {
            display: none;
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 107, .28);
            background: rgba(255, 107, 107, .08);
            color: #ffb1b1;
            font-size: 12px;
            line-height: 1.5;
        }

        .boot-inline {
            min-width: 220px;
            max-width: 320px;
            flex: 1 1 240px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .03);
        }

        .boot-inline.error {
            border-color: rgba(255, 107, 107, .25);
            background: rgba(255, 107, 107, .08);
        }

        .boot-inline-top {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text2);
        }

        .boot-inline-detail {
            font-size: 10px;
            color: var(--text3);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .boot-inline-bar {
            height: 6px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, .06);
        }

        .boot-inline-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width .45s ease;
        }

        /* Unit pill */
        .unit-pill {
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 9px;
            background: rgba(0, 144, 204, .15);
            border: 1px solid rgba(0, 144, 204, .3);
            color: var(--accent2);
            font-family: var(--mono);
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 4px;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-top: 1px solid var(--border);
        }

        .page-btn {
            padding: 3px 8px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 3px;
            color: var(--text3);
            cursor: pointer;
            font-size: 11px;
            font-family: var(--mono);
        }

        .page-btn:hover {
            border-color: var(--accent2);
            color: var(--text);
        }

        .page-btn.active {
            background: rgba(0, 212, 255, .1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-info {
            font-size: 10px;
            color: var(--text3);
            font-family: var(--mono);
            padding: 0 6px;
        }

        /* Section spacing */
        .section {
            margin-bottom: 12px;
        }

        .mb8 {
            margin-bottom: 8px;
        }

        /* Vital cards */
        .vital-now {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .vital-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 10px 12px;
        }

        .vc-label {
            font-size: 9px;
            color: var(--text3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .vc-val {
            font-family: var(--mono);
            font-size: 18px;
        }

        .vc-unit {
            font-size: 9px;
            color: var(--text3);
            margin-left: 2px;
        }

        .vc-status {
            font-size: 9px;
            margin-top: 2px;
        }

        /* Scan line effect */
        .scan-effect::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, .03) 2px,
                    rgba(0, 0, 0, .03) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body class="scan-effect">
    <div id="boot-loader" class="boot-shell">
        <div class="boot-card">
            <div class="boot-kicker">SMART ICU / SYSTEM BOOT</div>
            <div class="boot-title">Loading Smart ICU Dashboard…</div>
            <div id="boot-stage" class="boot-stage">Connecting to backend</div>
            <div id="boot-detail" class="boot-detail">Waiting for startup telemetry from the FastAPI service.</div>
            <div class="boot-progress">
                <div id="boot-progress-fill" class="boot-progress-fill"></div>
            </div>
            <div class="boot-meta">
                <span id="boot-step">Step 1 / 8</span>
                <span id="boot-percent">8%</span>
            </div>
            <div id="boot-error" class="boot-error"></div>
        </div>
    </div>
    <div id="root"></div>

    <script>
        window.__bootState = {
            stage: "connecting",
            label: "Connecting to backend",
            detail: "Waiting for startup telemetry from the FastAPI service.",
            progress: 0.08,
            current_step: 1,
            total_steps: 8,
            ready: false,
            error: null
        };
        window.__bootListeners = [];

        function renderBootLoader(state) {
            var fill = document.getElementById("boot-progress-fill");
            var stage = document.getElementById("boot-stage");
            var detail = document.getElementById("boot-detail");
            var step = document.getElementById("boot-step");
            var percent = document.getElementById("boot-percent");
            var error = document.getElementById("boot-error");
            if (fill) fill.style.width = Math.max(6, Math.round((state.progress || 0) * 100)) + "%";
            if (stage) stage.textContent = state.label || "Loading Smart ICU Dashboard…";
            if (detail) detail.textContent = state.detail || "";
            if (step) step.textContent = `Step ${state.current_step || 1} / ${state.total_steps || 8}`;
            if (percent) percent.textContent = `${Math.round((state.progress || 0) * 100)}%`;
            if (error) {
                error.style.display = state.error ? "block" : "none";
                error.textContent = state.error || "";
            }
        }

        window.__setBootState = function (nextState) {
            window.__bootState = Object.assign({}, window.__bootState, nextState || {});
            renderBootLoader(window.__bootState);
            window.__bootListeners.forEach(function (listener) { listener(window.__bootState); });
        };

        window.__subscribeBootState = function (listener) {
            window.__bootListeners.push(listener);
            listener(window.__bootState);
            return function () {
                window.__bootListeners = window.__bootListeners.filter(function (entry) { return entry !== listener; });
            };
        };

        window.__markDashboardMounted = function () {
            var loader = document.getElementById("boot-loader");
            if (!loader) return;
            window.setTimeout(function () {
                loader.classList.add("hidden");
            }, 250);
        };

        function pollBootStatus() {
            fetch("/api/boot_status", { cache: "no-store" })
                .then(function (response) {
                    if (!response.ok) throw new Error("Boot status unavailable");
                    return response.json();
                })
                .then(function (status) {
                    window.__setBootState(status);
                })
                .catch(function (error) {
                    window.__setBootState({
                        label: "Backend not ready yet",
                        detail: "Waiting for the API process to finish starting up.",
                        error: error.message,
                        progress: Math.max(window.__bootState.progress || 0, 0.08)
                    });
                });
        }

        window.addEventListener("DOMContentLoaded", function () {
            renderBootLoader(window.__bootState);
            pollBootStatus();
            window.setInterval(pollBootStatus, 2500);

            window.setTimeout(function () {
                var missing = [];
                if (typeof React === "undefined") missing.push("React");
                if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
                if (typeof Babel === "undefined") missing.push("Babel");
                if (typeof Recharts === "undefined") missing.push("Recharts");
                if (missing.length > 0) {
                    window.__setBootState({
                        label: "Dashboard assets failed to load",
                        detail: "Some required frontend libraries did not initialize correctly.",
                        error: "Missing dependencies: " + missing.join(", ")
                    });
                }
            }, 5000);
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const {
            LineChart, Line, AreaChart, Area, BarChart, Bar,
            XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine
        } = Recharts;

        const API = window.location.port === "8000" ? "/api" : "http://localhost:8000/api";

        // ── Utilities ────────────────────────────────────────────────────────────────

        function riskColor(r) {
            if (r === "HIGH") return "var(--red)";
            if (r === "MEDIUM") return "var(--orange)";
            return "var(--green)";
        }

        function scoreColor(s) {
            if (s > 0.7) return "var(--red)";
            if (s > 0.4) return "var(--orange)";
            return "var(--green)";
        }

        function fmtScore(s) { return (s * 100).toFixed(0) + "%"; }

        function fmtTime(iso) {
            const d = new Date(iso);
            return `${d.getHours().toString().padStart(2, "0")}:${d.getMinutes().toString().padStart(2, "0")}`;
        }

        function useBootStatus() {
            const [status, setStatus] = useState(window.__bootState || {});
            useEffect(() => {
                if (!window.__subscribeBootState) return undefined;
                return window.__subscribeBootState(setStatus);
            }, []);
            return status;
        }

        function useFetch(url, deps = []) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            useEffect(() => {
                if (!url) return;
                setLoading(true); setError(null);
                fetch(url)
                    .then(r => r.json())
                    .then(d => { setData(d); setLoading(false); })
                    .catch(e => { setError(e.message); setLoading(false); });
            }, deps);
            return { data, loading, error };
        }

        // ── Live Clock ────────────────────────────────────────────────────────────────
        function Clock() {
            const [t, setT] = useState(new Date());
            useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
            return (
                <span className="header-time">
                    {t.toLocaleDateString("en-GB")} &nbsp; {t.toLocaleTimeString("en-GB")}
                </span>
            );
        }

        // ── Patient List Item ─────────────────────────────────────────────────────────
        function PatientItem({ p, selected, onClick }) {
            return (
                <div className={`patient-item ${selected ? "selected" : ""}`} onClick={onClick}>
                    <div className="pi-top">
                        <span className="pi-id">#{p.icustay_id}</span>
                        <span className={`risk-badge risk-${p.risk_level}`}>{p.risk_level}</span>
                    </div>
                    <div className="pi-name">
                        {p.gender === "M" ? "♂" : "♀"} · {p.age ? Math.round(p.age) + " yrs" : "—"} ·{" "}
                        <span style={{ color: "var(--text3)" }}>{p.first_careunit || "—"}</span>
                    </div>
                    <div className="pi-diag">{p.diagnosis || "No diagnosis recorded"}</div>
                    <div className="score-bar-wrap" style={{ marginTop: 4 }}>
                        <div className="score-bar">
                            <div className="score-bar-fill" style={{
                                width: (p.composite_score * 100) + "%",
                                background: riskColor(p.risk_level)
                            }} />
                        </div>
                        <span className="score-val">{fmtScore(p.composite_score)}</span>
                    </div>
                </div>
            );
        }

        // ── Sidebar ───────────────────────────────────────────────────────────────────
        function Sidebar({ selected, onSelect }) {
            const [q, setQ] = useState("");
            const [risk, setRisk] = useState("");
            const [page, setPage] = useState(1);

            const url = `${API}/patients?q=${encodeURIComponent(q)}&risk=${risk}&page=${page}&per_page=18`;
            const { data, loading } = useFetch(url, [q, risk, page]);

            const patients = data?.patients || [];
            const pages = data?.pages || 1;

            return (
                <div className="sidebar">
                    <div className="sidebar-search">
                        <input
                            className="search-input"
                            placeholder="Search ID, diagnosis, unit…"
                            value={q}
                            onChange={e => { setQ(e.target.value); setPage(1); }}
                        />
                        <div className="filter-row">
                            {["HIGH", "MEDIUM", "LOW"].map(r => (
                                <button
                                    key={r}
                                    className={`filter-btn ${risk === r ? "active-" + r.toLowerCase() : ""}`}
                                    onClick={() => { setRisk(risk === r ? "" : r); setPage(1); }}
                                >{r}</button>
                            ))}
                        </div>
                    </div>

                    <div className="patient-list">
                        {loading && <div className="loading"><div className="spinner" />LOADING</div>}
                        {!loading && patients.map(p => (
                            <PatientItem
                                key={p.icustay_id}
                                p={p}
                                selected={selected?.icustay_id === p.icustay_id}
                                onClick={() => onSelect(p)}
                            />
                        ))}
                        {!loading && patients.length === 0 && (
                            <div className="empty">
                                <div className="empty-icon">◎</div>
                                <div className="empty-text">NO PATIENTS FOUND</div>
                            </div>
                        )}
                    </div>

                    {pages > 1 && (
                        <div className="pagination">
                            <button className="page-btn" onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}>‹</button>
                            <span className="page-info">{page} / {pages}</span>
                            <button className="page-btn" onClick={() => setPage(p => Math.min(pages, p + 1))} disabled={page === pages}>›</button>
                        </div>
                    )}
                </div>
            );
        }

        // ── Overview Tab ─────────────────────────────────────────────────────────────
        function OverviewTab() {
            const { data: stats, loading } = useFetch(`${API}/stats`, []);
            const { data: alertsData } = useFetch(`${API}/alerts`, []);
            const alerts = alertsData?.alerts?.slice(0, 8) || [];

            if (loading) return <div className="loading"><div className="spinner" />LOADING STATS</div>;
            if (!stats) return <div className="empty"><div className="empty-text">Connect to API at localhost:5000</div></div>;

            const rd = stats.risk_dist || {};
            const totalRisk = (rd.HIGH || 0) + (rd.MEDIUM || 0) + (rd.LOW || 0) || 1;

            return (
                <div>
                    {/* KPI row */}
                    <div className="grid-4 mb8">
                        <div className="stat-tile">
                            <div className="stat-label">Total Stays</div>
                            <div className="stat-value accent">{stats.total_stays?.toLocaleString()}</div>
                            <div className="stat-sub">{stats.total_patients?.toLocaleString()} unique patients</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Mean Age</div>
                            <div className="stat-value">{stats.mean_age}</div>
                            <div className="stat-sub">years</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Mean LOS</div>
                            <div className="stat-value yellow">{(stats.mean_los_hours / 24).toFixed(1)}</div>
                            <div className="stat-sub">days ({stats.mean_los_hours?.toFixed(0)} hrs)</div>
                        </div>
                        <div className="stat-tile">
                            <div className="stat-label">Expired</div>
                            <div className="stat-value red">{stats.expire_count?.toLocaleString()}</div>
                            <div className="stat-sub">{stats.total_stays ? ((stats.expire_count / stats.total_stays) * 100).toFixed(1) : "—"}% mortality rate</div>
                        </div>
                    </div>

                    <div className="chart-row">
                        {/* Risk distribution */}
                        <div className="card">
                            <div className="card-header"><span className="card-title">Risk Distribution</span></div>
                            <div className="card-body">
                                {[["HIGH", rd.HIGH || 0, "var(--red)"], ["MEDIUM", rd.MEDIUM || 0, "var(--orange)"], ["LOW", rd.LOW || 0, "var(--green)"]].map(([label, val, color]) => (
                                    <div key={label} style={{ marginBottom: 10 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                            <span style={{ fontFamily: "var(--mono)", fontSize: 10, color }}>{label}</span>
                                            <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--text3)" }}>{val?.toLocaleString()}</span>
                                        </div>
                                        <div style={{ height: 6, background: "var(--border)", borderRadius: 3, overflow: "hidden" }}>
                                            <div style={{ height: "100%", width: ((val / totalRisk) * 100) + "%", background: color, borderRadius: 3, transition: "width .5s" }} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Care units */}
                        <div className="card">
                            <div className="card-header"><span className="card-title">Care Units</span></div>
                            <div className="card-body">
                                {Object.entries(stats.care_units || {}).slice(0, 5).map(([unit, count]) => (
                                    <div key={unit} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                                        <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--accent2)", width: 120, flexShrink: 0 }}>{unit}</span>
                                        <div style={{ flex: 1, height: 4, background: "var(--border)", borderRadius: 2, overflow: "hidden" }}>
                                            <div style={{ height: "100%", width: ((count / (stats.total_stays || 1)) * 100) + "%", background: "var(--accent2)", borderRadius: 2 }} />
                                        </div>
                                        <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--text3)", minWidth: 36, textAlign: "right" }}>{count}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Alerts */}
                    <div className="card">
                        <div className="card-header">
                            <span className="card-title">Critical Alerts</span>
                            <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--red)" }}>
                                {alerts.length} HIGH RISK
                            </span>
                        </div>
                        <div className="card-body" style={{ maxHeight: 280, overflowY: "auto" }}>
                            {alerts.map(a => (
                                <div key={a.icustay_id} className={`alert-item ${a.risk_level === "MEDIUM" ? "medium" : ""}`}>
                                    <div className="alert-top">
                                        <span className="alert-id">ICU #{a.icustay_id}</span>
                                        <span className={`risk-badge risk-${a.risk_level}`}>{fmtScore(a.composite_score)}</span>
                                    </div>
                                    <div className="alert-diag">{a.diagnosis || "No diagnosis"} · {a.first_careunit || "—"}</div>
                                    <div className="alert-triggers">
                                        {a.triggered_labels?.map(t => (
                                            <span key={t.label} className="alert-trigger">
                                                {t.label.replace(/_/g, " ")} {fmtScore(t.score)}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                            {alerts.length === 0 && <div className="empty"><div className="empty-text">NO ALERTS</div></div>}
                        </div>
                    </div>
                </div>
            );
        }

        // ── Prediction score display ──────────────────────────────────────────────────
        function PredGroup({ title, labels, scores }) {
            return (
                <div className="pred-group">
                    <div className="pred-group-title">{title}</div>
                    <div className="pred-grid">
                        {labels.map(label => {
                            const s = scores?.[label] ?? 0;
                            const color = scoreColor(s);
                            const short = label.replace(/aki_stage/, "S").replace(/hypotension/, "hypo").replace(/vasopressor/, "vaso").replace(/ventilation/, "vent").replace(/mortality/, "mort").replace(/sepsis/, "seps").replace(/los_/, "los-");
                            return (
                                <div className="pred-item" key={label} style={{ borderColor: s > 0.65 ? "rgba(255,59,92,.3)" : undefined }}>
                                    <div className="pred-item-label">{short}</div>
                                    <div className="pred-item-score" style={{ color }}>{fmtScore(s)}</div>
                                    <div className="pred-mini-bar">
                                        <div className="pred-mini-fill" style={{ width: (s * 100) + "%", background: color }} />
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ── Patient Detail Tab ────────────────────────────────────────────────────────
        function PatientTab({ patient }) {
            const iid = patient?.icustay_id;
            const { data: preds } = useFetch(iid ? `${API}/patients/${iid}/predictions` : null, [iid]);
            const { data: vitData } = useFetch(iid ? `${API}/patients/${iid}/vitals` : null, [iid]);
            const { data: labData } = useFetch(iid ? `${API}/patients/${iid}/labs` : null, [iid]);

            if (!patient) return (
                <div className="empty" style={{ height: 300 }}>
                    <div className="empty-icon">⊕</div>
                    <div className="empty-text">SELECT A PATIENT FROM THE LIST</div>
                </div>
            );

            const vitals = vitData?.vitals || [];
            const labs = labData?.labs || [];

            const latestVital = vitals[vitals.length - 1] || {};

            const compScore = preds?.composite_score ?? 0;
            const compColor = riskColor(preds?.risk_level || "LOW");

            const TASK_GROUPS = {
                "Mortality": ["mortality_6h", "mortality_12h", "mortality_24h"],
                "Sepsis": ["sepsis_6h", "sepsis_12h", "sepsis_24h"],
                "AKI": ["aki_stage1_24h", "aki_stage2_24h", "aki_stage3_24h", "aki_stage1_48h", "aki_stage2_48h", "aki_stage3_48h"],
                "Hypotension": ["hypotension_1h", "hypotension_3h", "hypotension_6h"],
                "Vasopressor": ["vasopressor_6h", "vasopressor_12h"],
                "Ventilation": ["ventilation_6h", "ventilation_12h", "ventilation_24h"],
                "Length of Stay": ["los_short_24h", "los_long_72h"],
            };

            const vitalMeta = [
                { key: "heartrate", label: "Heart Rate", unit: "bpm", lo: 60, hi: 100 },
                { key: "meanbp", label: "MAP", unit: "mmHg", lo: 65, hi: 105 },
                { key: "spo2", label: "SpO₂", unit: "%", lo: 94, hi: 101 },
                { key: "resprate", label: "Resp Rate", unit: "/min", lo: 12, hi: 20 },
                { key: "tempc", label: "Temp", unit: "°C", lo: 36, hi: 38.3 },
                { key: "glucose", label: "Glucose", unit: "mg/dL", lo: 70, hi: 180 },
                { key: "sysbp", label: "Systolic BP", unit: "mmHg", lo: 90, hi: 140 },
                { key: "diasbp", label: "Diastolic BP", unit: "mmHg", lo: 60, hi: 90 },
            ];

            return (
                <div>
                    {/* Patient header */}
                    <div className="pt-header">
                        <div className="pt-id-block">
                            <div className="pt-icustay">ICU #{patient.icustay_id}</div>
                            <div className="pt-sub">SUBJ #{patient.subject_id}</div>
                            <div className="pt-sub">ADM #{patient.hadm_id}</div>
                        </div>
                        <div className="pt-meta">
                            {[
                                ["Age", patient.age ? Math.round(patient.age) + " yrs" : "—"],
                                ["Gender", patient.gender === "M" ? "Male" : "Female"],
                                ["Unit", patient.first_careunit || "—"],
                                ["Admission", patient.admission_type || "—"],
                                ["LOS", patient.los_hours ? (patient.los_hours / 24).toFixed(1) + " days" : "—"],
                                ["Status", patient.expire_flag ? "Deceased" : "Alive"],
                            ].map(([l, v]) => (
                                <div className="pt-meta-item" key={l}>
                                    <div className="pt-meta-label">{l}</div>
                                    <div className="pt-meta-val" style={{ color: l === "Status" && patient.expire_flag ? "var(--red)" : undefined }}>{v}</div>
                                </div>
                            ))}
                            {patient.diagnosis && (
                                <div className="pt-meta-item" style={{ maxWidth: 250 }}>
                                    <div className="pt-meta-label">Diagnosis</div>
                                    <div className="pt-meta-val" style={{ fontSize: 11, color: "var(--text2)" }}>{patient.diagnosis}</div>
                                </div>
                            )}
                        </div>
                        <div className="composite-circle" style={{ borderColor: compColor }}>
                            <div className="cc-score" style={{ color: compColor }}>{fmtScore(compScore)}</div>
                            <div className="cc-label">COMPOSITE</div>
                            <div className="cc-label" style={{ color: compColor }}>{preds?.risk_level || "—"}</div>
                        </div>
                    </div>

                    {/* Current vitals row */}
                    <div className="vital-now">
                        {vitalMeta.slice(0, 8).map(vm => {
                            const val = latestVital[vm.key];
                            const abnormal = val !== undefined && (val < vm.lo || val >= vm.hi);
                            return (
                                <div className="vital-card" key={vm.key} style={{ borderColor: abnormal ? "rgba(255,59,92,.4)" : undefined }}>
                                    <div className="vc-label">{vm.label}</div>
                                    <div className="vc-val" style={{ color: abnormal ? "var(--red)" : "var(--text)" }}>
                                        {val !== undefined ? val.toFixed(0) : "—"}
                                        <span className="vc-unit">{vm.unit}</span>
                                    </div>
                                    <div className="vc-status" style={{ color: abnormal ? "var(--red)" : "var(--green)" }}>
                                        {val !== undefined ? (abnormal ? "▲ ABNORMAL" : "✓ NORMAL") : "NO DATA"}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Charts row */}
                    <div className="chart-row">
                        <div className="card">
                            <div className="card-header"><span className="card-title">Heart Rate & MAP</span></div>
                            <div className="card-body" style={{ padding: "8px 4px 4px" }}>
                                <div className="chart-wrap">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={vitals.filter((_, i) => i % 2 === 0)} margin={{ top: 4, right: 8, bottom: 0, left: -20 }}>
                                            <XAxis dataKey="charttime" tickFormatter={fmtTime} tick={{ fontSize: 9, fill: "var(--text3)" }} interval={Math.floor(vitals.length / 6)} />
                                            <YAxis tick={{ fontSize: 9, fill: "var(--text3)" }} />
                                            <Tooltip contentStyle={{ background: "var(--panel)", border: "1px solid var(--border)", fontSize: 10 }} labelFormatter={fmtTime} />
                                            <ReferenceLine y={90} stroke="rgba(255,59,92,.3)" strokeDasharray="3 3" />
                                            <Line type="monotone" dataKey="heartrate" stroke="var(--red)" dot={false} strokeWidth={1.5} name="HR" />
                                            <Line type="monotone" dataKey="meanbp" stroke="var(--accent)" dot={false} strokeWidth={1.5} name="MAP" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-header"><span className="card-title">SpO₂ & Resp Rate</span></div>
                            <div className="card-body" style={{ padding: "8px 4px 4px" }}>
                                <div className="chart-wrap">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={vitals.filter((_, i) => i % 2 === 0)} margin={{ top: 4, right: 8, bottom: 0, left: -20 }}>
                                            <XAxis dataKey="charttime" tickFormatter={fmtTime} tick={{ fontSize: 9, fill: "var(--text3)" }} interval={Math.floor(vitals.length / 6)} />
                                            <YAxis tick={{ fontSize: 9, fill: "var(--text3)" }} />
                                            <Tooltip contentStyle={{ background: "var(--panel)", border: "1px solid var(--border)", fontSize: 10 }} labelFormatter={fmtTime} />
                                            <ReferenceLine y={94} stroke="rgba(255,59,92,.3)" strokeDasharray="3 3" />
                                            <Line type="monotone" dataKey="spo2" stroke="var(--green)" dot={false} strokeWidth={1.5} name="SpO2" />
                                            <Line type="monotone" dataKey="resprate" stroke="var(--yellow)" dot={false} strokeWidth={1.5} name="RR" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Lab trends */}
                    <div className="chart-row">
                        <div className="card">
                            <div className="card-header"><span className="card-title">Creatinine & Lactate</span></div>
                            <div className="card-body" style={{ padding: "8px 4px 4px" }}>
                                <div className="chart-wrap">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={labs} margin={{ top: 4, right: 8, bottom: 0, left: -20 }}>
                                            <XAxis dataKey="charttime" tickFormatter={fmtTime} tick={{ fontSize: 9, fill: "var(--text3)" }} interval={Math.floor(labs.length / 4)} />
                                            <YAxis tick={{ fontSize: 9, fill: "var(--text3)" }} />
                                            <Tooltip contentStyle={{ background: "var(--panel)", border: "1px solid var(--border)", fontSize: 10 }} labelFormatter={fmtTime} />
                                            <Line type="monotone" dataKey="creatinine" stroke="var(--orange)" dot={true} strokeWidth={1.5} name="Creatinine" />
                                            <Line type="monotone" dataKey="lactate" stroke="var(--red)" dot={true} strokeWidth={1.5} name="Lactate" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-header"><span className="card-title">WBC & Hemoglobin</span></div>
                            <div className="card-body" style={{ padding: "8px 4px 4px" }}>
                                <div className="chart-wrap">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={labs} margin={{ top: 4, right: 8, bottom: 0, left: -20 }}>
                                            <XAxis dataKey="charttime" tickFormatter={fmtTime} tick={{ fontSize: 9, fill: "var(--text3)" }} interval={Math.floor(labs.length / 4)} />
                                            <YAxis tick={{ fontSize: 9, fill: "var(--text3)" }} />
                                            <Tooltip contentStyle={{ background: "var(--panel)", border: "1px solid var(--border)", fontSize: 10 }} labelFormatter={fmtTime} />
                                            <Line type="monotone" dataKey="wbc" stroke="var(--accent)" dot={true} strokeWidth={1.5} name="WBC" />
                                            <Line type="monotone" dataKey="hemoglobin" stroke="var(--yellow)" dot={true} strokeWidth={1.5} name="Hgb" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Prediction scores */}
                    <div className="card section">
                        <div className="card-header">
                            <span className="card-title">All 22 Prediction Scores</span>
                            <span style={{ fontFamily: "var(--mono)", fontSize: 9, color: "var(--text3)" }}>
                                UPDATED {preds?.updated_at ? new Date(preds.updated_at).toLocaleTimeString() : "—"}
                            </span>
                        </div>
                        <div className="card-body" style={{ maxHeight: 420, overflowY: "auto" }}>
                            {preds
                                ? Object.entries(TASK_GROUPS).map(([title, labels]) => (
                                    <PredGroup key={title} title={title} labels={labels} scores={preds.scores} />
                                ))
                                : <div className="loading"><div className="spinner" />LOADING PREDICTIONS</div>
                            }
                        </div>
                    </div>

                    {/* SHAP */}
                    <div className="card section">
                        <div className="card-header"><span className="card-title">Readmission Risk · SHAP Feature Importance</span></div>
                        <div className="card-body">
                            {preds?.shap_features?.map((f, i) => {
                                const max = preds.shap_features[0]?.value || 1;
                                return (
                                    <div className="shap-row" key={f.feature}>
                                        <span className="shap-feature">{f.feature}</span>
                                        <div className="shap-bar-wrap">
                                            <div className="shap-bar">
                                                <div className="shap-bar-fill" style={{ width: ((f.value / max) * 100) + "%" }} />
                                            </div>
                                        </div>
                                        <span className="shap-val">{f.value.toFixed(3)}</span>
                                    </div>
                                );
                            })}
                            {!preds && <div className="loading"><div className="spinner" />LOADING</div>}
                        </div>
                    </div>
                </div>
            );
        }

        // ── Alerts Tab ────────────────────────────────────────────────────────────────
        function AlertsTab({ onSelectPatient }) {
            const { data, loading } = useFetch(`${API}/alerts`, []);
            const alerts = data?.alerts || [];

            return (
                <div>
                    <div className="card-header" style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 6, marginBottom: 12, padding: "10px 14px" }}>
                        <span className="card-title">Active Critical Alerts</span>
                        <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--red)" }}>
                            {alerts.filter(a => a.risk_level === "HIGH").length} HIGH · {alerts.filter(a => a.risk_level === "MEDIUM").length} MEDIUM
                        </span>
                    </div>
                    {loading && <div className="loading"><div className="spinner" />SCANNING</div>}
                    {alerts.map(a => (
                        <div
                            key={a.icustay_id}
                            className={`alert-item ${a.risk_level === "MEDIUM" ? "medium" : ""}`}
                            style={{ cursor: "pointer" }}
                            onClick={() => onSelectPatient(a)}
                        >
                            <div className="alert-top">
                                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                    <span className="alert-id">ICU #{a.icustay_id}</span>
                                    <span className="unit-pill">{a.first_careunit || "—"}</span>
                                    <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--text3)" }}>
                                        {a.gender} · {a.age ? Math.round(a.age) + "yr" : "—"}
                                    </span>
                                </div>
                                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    <span className={`risk-badge risk-${a.risk_level}`}>{fmtScore(a.composite_score)}</span>
                                </div>
                            </div>
                            <div className="alert-diag">{a.diagnosis || "No diagnosis recorded"}</div>
                            <div className="alert-triggers">
                                {a.triggered_labels?.map(t => (
                                    <span key={t.label} className="alert-trigger">
                                        {t.label.replace(/_/g, " ").toUpperCase()} · {fmtScore(t.score)}
                                    </span>
                                ))}
                            </div>
                        </div>
                    ))}
                    {!loading && alerts.length === 0 && (
                        <div className="empty"><div className="empty-icon">◎</div><div className="empty-text">NO ACTIVE ALERTS</div></div>
                    )}
                </div>
            );
        }

        // ── New Assessment Tab ────────────────────────────────────────────────────────
        function AssessTab() {
            const [form, setForm] = useState({
                age: 60, gender: "M", weight_kg: 75,
                heartrate: 88, sysbp: 120, diasbp: 75, meanbp: 90, resprate: 18, tempc: 37.0, spo2: 97, glucose: 110,
                creatinine: 1.0, lactate: 1.2, wbc: 8000, hemoglobin: 13, platelets: 250, bicarbonate: 24, chloride: 102,
                vasopressors: false, antibiotics: false, mechanical_ventilation: false, sedation: false,
                hours_in_icu: 6, prior_icu_admissions: 0, diagnosis: "", comorbidities: ""
            });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

            const runAssessment = async () => {
                setLoading(true);
                try {
                    const body = {
                        demographics: { age: +form.age, gender: form.gender, weight_kg: +form.weight_kg },
                        vitals: { heartrate: +form.heartrate, sysbp: +form.sysbp, diasbp: +form.diasbp, meanbp: +form.meanbp, resprate: +form.resprate, tempc: +form.tempc, spo2: +form.spo2, glucose: +form.glucose },
                        labs: { creatinine: +form.creatinine, lactate: +form.lactate, wbc: +form.wbc, hemoglobin: +form.hemoglobin, platelets: +form.platelets, bicarbonate: +form.bicarbonate, chloride: +form.chloride },
                        medications: { vasopressors: form.vasopressors, antibiotics: form.antibiotics, mechanical_ventilation: form.mechanical_ventilation, sedation: form.sedation },
                        history: { hours_in_icu: +form.hours_in_icu, prior_icu_admissions: +form.prior_icu_admissions, diagnosis: form.diagnosis, comorbidities: form.comorbidities ? form.comorbidities.split(",").map(s => s.trim()) : [] }
                    };
                    const res = await fetch(`${API}/predict`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
                    const data = await res.json();
                    setResult(data);
                } catch (e) { console.error("Predict error:", e); }
                setLoading(false);
            };

            const rColor = (v) => v > 0.6 ? "var(--red)" : v > 0.3 ? "var(--orange)" : "var(--green)";
            const fmtPct = (v) => (v * 100).toFixed(0) + "%";

            const InputField = ({ label, k, type = "number", step, hint }) => (
                <div className="input-group">
                    <label>{label}{hint && <span style={{ color: "var(--text3)", marginLeft: 4 }}>({hint})</span>}</label>
                    <input type={type} value={form[k]} step={step || "any"} onChange={e => set(k, type === "number" ? e.target.value : e.target.value)} />
                </div>
            );

            const Toggle = ({ label, k }) => (
                <div className="toggle-row">
                    <label>{label}</label>
                    <div className={`toggle-switch ${form[k] ? "on" : ""}`} onClick={() => set(k, !form[k])} />
                </div>
            );

            return (
                <div className="assess-layout">
                    {/* INPUT FORM */}
                    <div className="assess-form">
                        <div className="input-section">
                            <div className="input-section-title">Demographics</div>
                            <div className="input-grid">
                                <InputField label="Age" k="age" hint="years" />
                                <div className="input-group">
                                    <label>Gender</label>
                                    <select value={form.gender} onChange={e => set("gender", e.target.value)} style={{ background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 4, padding: "6px 8px", color: "var(--text1)", fontSize: 13, fontFamily: "var(--mono)" }}>
                                        <option value="M">Male</option>
                                        <option value="F">Female</option>
                                    </select>
                                </div>
                                <InputField label="Weight" k="weight_kg" hint="kg" />
                            </div>
                        </div>

                        <div className="input-section">
                            <div className="input-section-title">Vital Signs</div>
                            <div className="input-grid">
                                <InputField label="Heart Rate" k="heartrate" hint="bpm" />
                                <InputField label="Systolic BP" k="sysbp" hint="mmHg" />
                                <InputField label="Diastolic BP" k="diasbp" hint="mmHg" />
                                <InputField label="Mean BP (MAP)" k="meanbp" hint="mmHg" />
                                <InputField label="Resp Rate" k="resprate" hint="/min" />
                                <InputField label="Temperature" k="tempc" hint="°C" step="0.1" />
                                <InputField label="SpO₂" k="spo2" hint="%" />
                                <InputField label="Glucose" k="glucose" hint="mg/dL" />
                            </div>
                        </div>

                        <div className="input-section">
                            <div className="input-section-title">Laboratory Values</div>
                            <div className="input-grid">
                                <InputField label="Creatinine" k="creatinine" hint="mg/dL" step="0.1" />
                                <InputField label="Lactate" k="lactate" hint="mmol/L" step="0.1" />
                                <InputField label="WBC" k="wbc" hint="/µL" />
                                <InputField label="Hemoglobin" k="hemoglobin" hint="g/dL" step="0.1" />
                                <InputField label="Platelets" k="platelets" hint="×10³" />
                                <InputField label="Bicarbonate" k="bicarbonate" hint="mEq/L" />
                                <InputField label="Chloride" k="chloride" hint="mEq/L" />
                            </div>
                        </div>

                        <div className="input-section">
                            <div className="input-section-title">Current Medications</div>
                            <Toggle label="Vasopressors" k="vasopressors" />
                            <Toggle label="Antibiotics" k="antibiotics" />
                            <Toggle label="Mechanical Ventilation" k="mechanical_ventilation" />
                            <Toggle label="Sedation" k="sedation" />
                        </div>

                        <div className="input-section">
                            <div className="input-section-title">ICU Context</div>
                            <div className="input-grid">
                                <InputField label="Hours in ICU" k="hours_in_icu" />
                                <InputField label="Prior ICU Visits" k="prior_icu_admissions" />
                            </div>
                            <div className="input-group" style={{ marginTop: 8 }}>
                                <label>Diagnosis</label>
                                <input type="text" value={form.diagnosis} onChange={e => set("diagnosis", e.target.value)} placeholder="e.g. Pneumonia" style={{ background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 4, padding: "6px 8px", color: "var(--text1)", fontSize: 13 }} />
                            </div>
                            <div className="input-group" style={{ marginTop: 6 }}>
                                <label>Comorbidities (comma-separated)</label>
