                                <input type="text" value={form.comorbidities} onChange={e => set("comorbidities", e.target.value)} placeholder="e.g. diabetes, hypertension" style={{ background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 4, padding: "6px 8px", color: "var(--text1)", fontSize: 13 }} />
                            </div>
                        </div>

                        <button className="assess-btn" onClick={runAssessment} disabled={loading}>
                            {loading ? "Analyzing…" : "⚡ Run Assessment"}
                        </button>
                    </div>

                    {/* RESULTS PANEL */}
                    <div className="assess-results">
                        {!result && (
                            <div className="assess-empty">
                                <div className="assess-empty-icon">🏥</div>
                                <div style={{ fontFamily: "var(--mono)", fontSize: 12, letterSpacing: 1 }}>ENTER PATIENT DATA AND RUN ASSESSMENT</div>
                                <div style={{ fontSize: 11, maxWidth: 300, textAlign: "center", lineHeight: 1.5 }}>Fill in the clinical data on the left and click Run Assessment to get real-time risk predictions across all categories.</div>
                            </div>
                        )}
                        {result && (
                            <>
                                {/* Risk Gauge */}
                                <div className="risk-gauge">
                                    <div className="gauge-ring" style={{ border: `4px solid ${rColor(result.composite_score)}`, boxShadow: `0 0 20px ${rColor(result.composite_score)}33` }}>
                                        <div>
                                            <div className="gauge-inner" style={{ color: rColor(result.composite_score) }}>{fmtPct(result.composite_score)}</div>
                                            <div className="gauge-label" style={{ color: rColor(result.composite_score) }}>{result.risk_level} RISK</div>
                                        </div>
                                    </div>
                                    <div style={{ display: "flex", justifyContent: "center", gap: 12, marginTop: 12, flexWrap: "wrap" }}>
                                        {result.clinical_scores && (
                                            <>
                                                <span className="clinical-badge">SIRS: <strong style={{ color: result.clinical_scores.sirs >= 3 ? "var(--red)" : result.clinical_scores.sirs >= 2 ? "var(--orange)" : "var(--green)" }}>{result.clinical_scores.sirs}/4</strong></span>
                                                <span className="clinical-badge">Shock Index: <strong style={{ color: result.clinical_scores.shock_index > 1 ? "var(--red)" : "var(--green)" }}>{result.clinical_scores.shock_index}</strong></span>
                                                <span className="clinical-badge">MAP: <strong style={{ color: result.clinical_scores.map < 65 ? "var(--red)" : result.clinical_scores.map < 70 ? "var(--orange)" : "var(--green)" }}>{result.clinical_scores.map}</strong></span>
                                            </>
                                        )}
                                        <span className="clinical-badge" style={{ borderColor: "var(--text3)" }}>Source: {result.source}</span>
                                    </div>
                                </div>

                                {/* Per-category results */}
                                {result.groups && Object.entries(result.groups).map(([group, scores]) => (
                                    <div key={group} className="result-card">
                                        <div className="result-card-title">{group}</div>
                                        {Object.entries(scores).map(([label, val]) => (
                                            <div key={label} className="result-row">
                                                <div className="result-label">{label.replace(/_/g, " ")}</div>
                                                <div className="result-bar">
                                                    <div className="result-fill" style={{ width: fmtPct(val), background: rColor(val) }} />
                                                </div>
                                                <div className="result-val" style={{ color: rColor(val) }}>{fmtPct(val)}</div>
                                            </div>
                                        ))}
                                    </div>
                                ))}

                                {/* Alerts */}
                                {result.alerts && result.alerts.length > 0 && (
                                    <div className="result-card">
                                        <div className="result-card-title">Clinical Alerts</div>
                                        {result.alerts.map((a, i) => (
                                            <div key={i} className={`assess-alert ${a.type}`}>
                                                <div className="assess-alert-cat" style={{ color: a.type === "critical" ? "var(--red)" : "var(--orange)" }}>{a.type.toUpperCase()} · {a.category}</div>
                                                <div className="assess-alert-msg">{a.message}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // ── App ───────────────────────────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState("overview");
            const [selectedPatient, setSelectedPatient] = useState(null);
            const bootStatus = useBootStatus();

            useEffect(() => {
                if (window.__markDashboardMounted) window.__markDashboardMounted();
            }, []);

            const handleSelectPatient = (p) => {
                setSelectedPatient(p);
                setTab("patient");
            };

            const tabs = [
                { id: "overview", label: "Overview" },
                { id: "patient", label: selectedPatient ? `Patient #${selectedPatient.icustay_id}` : "Patient Detail" },
                { id: "alerts", label: "Alerts" },
                { id: "assess", label: "⚡ New Assessment" },
            ];

            return (
                <div className="app">
                    <div className="header">
                        <div className="header-logo">Smart<span>/</span>ICU</div>
                        <div className="header-dot" />
                        <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--text3)", letterSpacing: 1 }}>
                            MIMIC-III · DECISION SUPPORT SYSTEM
                        </span>
                        {(!bootStatus.ready || bootStatus.error) && (
                            <div className={`boot-inline ${bootStatus.error ? "error" : ""}`}>
                                <div className="boot-inline-top">
                                    <span>{bootStatus.label || "System warm-up"}</span>
                                    <span>{Math.round((bootStatus.progress || 0) * 100)}%</span>
                                </div>
                                <div className="boot-inline-detail">
                                    {bootStatus.error || bootStatus.detail || "Preparing realtime data feeds."}
                                </div>
                                <div className="boot-inline-bar">
                                    <div className="boot-inline-fill" style={{ width: `${Math.max(6, Math.round((bootStatus.progress || 0) * 100))}%` }} />
                                </div>
                            </div>
                        )}
                        <Clock />
                    </div>

                    <div className="tabs">
                        {tabs.map(t => (
                            <button key={t.id} className={`tab ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                                {t.label}
                            </button>
                        ))}
                    </div>

                    <div className="main">
                        <Sidebar selected={selectedPatient} onSelect={handleSelectPatient} />
                        <div className="content">
                            <div className="content-scroll">
                                {tab === "overview" && <OverviewTab />}
                                {tab === "patient" && <PatientTab patient={selectedPatient} />}
                                {tab === "alerts" && <AlertsTab onSelectPatient={handleSelectPatient} />}
                                {tab === "assess" && <AssessTab />}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
