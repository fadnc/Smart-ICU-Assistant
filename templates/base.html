<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Smart ICU Assistant{% endblock %}</title>
  <meta name="description" content="Real-time ICU patient monitoring and risk prediction powered by deep learning on MIMIC-III clinical data." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════════════════════════════════
       DARK THEME (default — premium dark-first design)
       ═══════════════════════════════════════════════════════════ */
    :root, [data-theme="dark"] {
      --bg:          #050505;
      --bg-2:        #0a0a0a;
      --bg-card:     rgba(15,15,15,0.7);
      --bg-card-2:   rgba(20,20,20,0.5);
      --bg-card-solid: #0f0f0f;
      --bg-nav:      rgba(10,10,10,0.85);
      --bg-input:    rgba(255,255,255,0.03);
      --border:      rgba(255,255,255,0.05);
      --border-2:    rgba(255,255,255,0.1);
      --shadow:      0 2px 8px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.2);
      --shadow-lg:   0 8px 40px rgba(0,0,0,0.5), 0 0 80px rgba(0,212,255,0.03);
      --glow-primary: 0 0 20px rgba(0,212,255,0.15), 0 0 60px rgba(0,212,255,0.05);
      --glow-accent:  0 0 20px rgba(168,85,247,0.15), 0 0 60px rgba(168,85,247,0.05);

      --primary:     #00d4ff;
      --primary-rgb: 0,212,255;
      --primary-bg:  rgba(0,212,255,0.08);
      --primary-border: rgba(0,212,255,0.2);
      --success:     #22c55e;
      --success-bg:  rgba(34,197,94,0.1);
      --success-border: rgba(34,197,94,0.2);
      --danger:      #ef4444;
      --danger-bg:   rgba(239,68,68,0.1);
      --danger-border: rgba(239,68,68,0.2);
      --warning:     #f59e0b;
      --warning-bg:  rgba(245,158,11,0.1);
      --warning-border: rgba(245,158,11,0.2);
      --accent:      #a855f7;
      --accent-rgb:  168,85,247;
      --gradient-accent: linear-gradient(135deg, #00d4ff, #7c3aed);

      --text-1:      #f0f4ff;
      --text-2:      #8b9dc3;
      --text-3:      #4a5578;
      --text-inverse:#060918;

      --ff-display:  'Outfit', 'Inter', -apple-system, sans-serif;
      --ff-body:     'Inter', -apple-system, sans-serif;
      --ff-mono:     'JetBrains Mono', monospace;
      --radius:      16px;
      --radius-sm:   10px;
      --radius-pill: 100px;
      --transition:  0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --spring:      0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --glass:       blur(20px) saturate(1.4);
    }

    /* ═══════════════════════════════════════════════════════════
       LIGHT THEME
       ═══════════════════════════════════════════════════════════ */
    [data-theme="light"] {
      --bg:          #f0f2f8;
      --bg-2:        #e8ecf4;
      --bg-card:     rgba(255,255,255,0.85);
      --bg-card-2:   rgba(245,247,252,0.9);
      --bg-card-solid: #ffffff;
      --bg-nav:      rgba(255,255,255,0.88);
      --bg-input:    rgba(15,23,42,0.04);
      --border:      rgba(15,23,42,0.08);
      --border-2:    rgba(15,23,42,0.12);
      --shadow:      0 1px 3px rgba(15,23,42,0.06), 0 6px 24px rgba(15,23,42,0.06);
      --shadow-lg:   0 8px 40px rgba(15,23,42,0.1);

      --primary:     #0284c7;
      --primary-rgb: 2,132,199;
      --primary-bg:  rgba(2,132,199,0.07);
      --primary-border: rgba(2,132,199,0.18);
      --success:     #16a34a;
      --success-bg:  rgba(22,163,74,0.07);
      --success-border: rgba(22,163,74,0.18);
      --danger:      #dc2626;
      --danger-bg:   rgba(220,38,38,0.06);
      --danger-border: rgba(220,38,38,0.18);
      --warning:     #d97706;
      --warning-bg:  rgba(217,119,6,0.07);
      --warning-border: rgba(217,119,6,0.18);
      --accent:      #7c3aed;
      --accent-rgb:  124,58,237;

      --text-1:      #0f172a;
      --text-2:      #475569;
      --text-3:      #94a3b8;
      --text-inverse:#ffffff;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--ff-body); font-size: 14px; line-height: 1.7;
      min-height: 100vh; overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    body::before {
      content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(0,212,255,0.03) 0%, transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(168,85,247,0.03) 0%, transparent 40%);
      pointer-events: none; z-index: -1;
      animation: bgPulse 15s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.1) translate(-2%, 2%); } }
    [data-theme="light"] body { background: var(--bg); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 6px; }

    /* ── NAV (floating pill glassmorphism) ────────────────────── */
    nav {
      position: sticky; top: 12px; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 56px;
      max-width: 1260px; margin: 12px auto 0;
      background: var(--bg-nav); backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.2);
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--gradient-accent);
      display: grid; place-items: center;
      box-shadow: 0 2px 12px rgba(0,212,255,0.3);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .brand:hover .brand-icon { transform: scale(1.08) rotate(-3deg); box-shadow: var(--glow-primary); }
    .brand-icon svg { width: 18px; height: 18px; fill: white; }
    .brand-text {
      font-family: var(--ff-display); font-weight: 700; font-size: 17px; color: var(--text-1);
      letter-spacing: -0.03em;
    }
    .brand-text span {
      background: var(--gradient-accent); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-links { display: flex; align-items: center; gap: 2px; }
    .nav-link {
      font-size: 13px; font-weight: 500; color: var(--text-3);
      text-decoration: none; padding: 7px 14px; border-radius: var(--radius-pill);
      transition: color var(--transition), background var(--transition);
      position: relative;
    }
    .nav-link:hover { color: var(--text-1); background: var(--primary-bg); }
    .nav-link.active {
      color: var(--primary); background: var(--primary-bg);
      box-shadow: inset 0 0 0 1px var(--primary-border);
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* Theme toggle capsule */
    .theme-toggle {
      width: 44px; height: 24px; border-radius: 100px; cursor: pointer;
      background: var(--border-2); border: 1px solid var(--border); position: relative;
      transition: background var(--transition), border-color var(--transition);
    }
    .theme-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      transition: transform var(--transition);
    }
    [data-theme="dark"] .theme-toggle { background: var(--primary); border-color: transparent; }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(20px); }

    .theme-label {
      font-size: 11px; color: var(--text-3); font-weight: 500;
    }

    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; color: var(--success);
      padding: 4px 12px; border-radius: var(--radius-pill);
      background: var(--success-bg); border: 1px solid var(--success-border);
    }
    .status-dot::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--success); box-shadow: 0 0 10px rgba(34,197,94,0.5);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    .nav-api {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-decoration: none; transition: color var(--transition);
      padding: 4px 10px; border-radius: var(--radius-pill);
      border: 1px solid var(--border);
    }
    .nav-api:hover { color: var(--primary); border-color: var(--primary-border); }

    /* ── LAYOUT ───────────────────────────────────────────────── */
    .container {
      position: relative; max-width: 1200px; margin: 0 auto;
      padding: 32px 32px 60px;
    }
    .page-header { margin-bottom: 32px; }
    .page-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 8px;
      background: var(--gradient-accent); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      display: inline-block;
    }
    .page-title {
      font-family: var(--ff-display); font-size: 36px; font-weight: 800;
      color: var(--text-1); letter-spacing: -0.03em; line-height: 1.1;
    }
    .page-sub {
      font-size: 15px; color: var(--text-2); max-width: 560px;
      font-weight: 400; line-height: 1.7; margin-top: 10px;
    }

    /* ── CARDS / PANELS ──────────────────────────────────────── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
      box-shadow: var(--shadow); position: relative;
      backdrop-filter: blur(8px);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition), transform var(--transition);
    }
    .card:hover { border-color: var(--border-2); box-shadow: var(--shadow-lg); }
    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg-card-2); backdrop-filter: blur(4px);
    }
    .card-label {
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text-2);
      display: flex; align-items: center; gap: 6px;
    }
    .card-badge {
      font-family: var(--ff-mono); font-size: 10px;
      padding: 3px 10px; border-radius: 100px;
      background: var(--primary-bg); color: var(--primary);
      border: 1px solid var(--primary-border); font-weight: 600;
    }
    .card-body { padding: 20px; }

    /* ── GRID ─────────────────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    /* ── STAT TILES ───────────────────────────────────────────── */
    .stat-tile {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
      backdrop-filter: blur(8px);
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition), border-color var(--transition);
    }
    .stat-tile::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--gradient-accent); opacity: 0;
      transition: opacity var(--transition);
    }
    .stat-tile:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--border-2); }
    .stat-tile:hover::before { opacity: 1; }
    .stat-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: grid; place-items: center; margin-bottom: 12px;
      font-size: 20px;
    }
    .stat-label {
      font-size: 10px; font-weight: 700; color: var(--text-3);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--ff-display); font-size: 30px; font-weight: 800;
      line-height: 1; letter-spacing: -0.03em;
    }
    .stat-sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }

    /* ── TABLE ────────────────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text-3);
      text-align: left; padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      font-size: 13px; color: var(--text-2); padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .data-table tbody tr { cursor: pointer; transition: all var(--spring); border-left: 3px solid transparent; }
    .data-table tbody tr:hover { background: var(--primary-bg); border-left-color: var(--primary); transform: translateX(4px); }

    /* ── BADGES ───────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 100px; letter-spacing: 0.02em;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    .badge-high {
      background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border);
      animation: pulseHighRisk 2s ease-in-out infinite;
    }
    @keyframes pulseHighRisk { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 12px rgba(239,68,68,0.3)} }
    .badge-medium { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }
    .badge-low { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }

    /* ── BUTTONS ──────────────────────────────────────────────── */
    .btn {
      font-size: 13px; font-weight: 500; padding: 8px 16px;
      border-radius: var(--radius-pill); cursor: pointer;
      border: 1px solid var(--border-2); background: var(--bg-card);
      color: var(--text-2); text-decoration: none;
      transition: all var(--spring);
      display: inline-flex; align-items: center; gap: 6px;
      backdrop-filter: blur(4px);
    }
    .btn:hover { color: var(--primary); border-color: var(--primary-border); background: var(--primary-bg); }
    .btn-primary {
      background: var(--gradient-accent); color: white; border-color: transparent;
      font-weight: 600; box-shadow: 0 2px 12px rgba(0,212,255,0.2);
    }
    .btn-primary:hover { box-shadow: var(--glow-primary); transform: translateY(-1px); color: white; }

    /* ── BARS ─────────────────────────────────────────────────── */
    .bar-track {
      height: 8px; background: var(--bg); border-radius: 8px; overflow: hidden;
      flex: 1;
    }
    [data-theme="dark"] .bar-track { background: var(--bg-card-2); }
    .bar-fill {
      height: 100%; border-radius: 8px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
      position: relative; overflow: hidden;
    }
    .bar-fill::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: barShine 2s ease-in-out infinite;
    }
    @keyframes barShine { 0%{left:-100%} 100%{left:100%} }
    .bar-row { display: flex; align-items: center; gap: 12px; padding: 5px 0; }
    .bar-label { font-size: 13px; color: var(--text-2); min-width: 140px; }
    .bar-value {
      font-family: var(--ff-mono); font-size: 12px; font-weight: 600;
      min-width: 50px; text-align: right;
    }

    /* ── MATCH ────────────────────────────────────────────────── */
    .match { color: var(--success); }
    .mismatch { color: var(--danger); }
    .match-icon { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; }
    .match-icon svg { width: 16px; height: 16px; }

    /* ── INLINE SVG ICONS ─────────────────────────────────────── */
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon svg { width: 1em; height: 1em; fill: currentColor; }
    .icon-sm svg { width: 14px; height: 14px; }
    .icon-md svg { width: 18px; height: 18px; }
    .icon-lg svg { width: 24px; height: 24px; }
    .icon-xl svg { width: 32px; height: 32px; }
    .stat-icon-svg {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: grid; place-items: center; margin-bottom: 12px;
    }
    .stat-icon-svg svg { width: 22px; height: 22px; }

    /* ── MOBILE HAMBURGER ─────────────────────────────────────── */
    .hamburger {
      display: none; background: none; border: none; cursor: pointer;
      width: 36px; height: 36px; padding: 6px;
      border-radius: var(--radius-sm);
      transition: background var(--transition);
    }
    .hamburger:hover { background: var(--primary-bg); }
    .hamburger svg { width: 24px; height: 24px; fill: var(--text-2); }
    .nav-overlay {
      display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 90;
    }
    .nav-overlay.open { display: block; }

    /* ── PAGINATION ───────────────────────────────────────────── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 4px; margin-top: 20px;
    }
    .pagination a {
      font-size: 13px; font-weight: 500; color: var(--text-3);
      text-decoration: none; padding: 6px 12px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); transition: all var(--transition);
    }
    .pagination a:hover { color: var(--primary); border-color: var(--primary-border); }
    .pagination a.active { color: white; background: var(--primary); border-color: var(--primary); }

    /* ── EMPTY ────────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-3); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
    .empty-text { font-size: 14px; line-height: 1.7; }

    /* ── FOOTER ───────────────────────────────────────────────── */
    footer {
      border-top: 2px solid transparent;
      border-image: var(--gradient-accent) 1;
      padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color var(--transition);
      margin-top: 20px;
    }
    .footer-copy { font-size: 12px; color: var(--text-3); }
    .footer-tags { display: flex; gap: 6px; }
    .footer-tag {
      font-family: var(--ff-mono); font-size: 10px; color: var(--text-3);
      border: 1px solid var(--border); padding: 3px 10px; border-radius: 100px;
      background: var(--bg-card); backdrop-filter: blur(4px);
      transition: color var(--transition), border-color var(--transition);
    }
    .footer-tag:hover { color: var(--primary); border-color: var(--primary-border); }

    /* ── TOAST NOTIFICATIONS ──────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; border-radius: var(--radius-sm);
      background: var(--bg-card); border: 1px solid var(--border);
      box-shadow: var(--shadow-lg); font-size: 13px; color: var(--text-1);
      min-width: 280px; max-width: 400px;
      animation: toastIn 0.35s ease forwards;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .toast.toast-out { animation: toastOut 0.3s ease forwards; }
    .toast-success { border-left: 3px solid var(--success); }
    .toast-error   { border-left: 3px solid var(--danger); }
    .toast-warning { border-left: 3px solid var(--warning); }
    .toast-info    { border-left: 3px solid var(--primary); }
    .toast-icon { flex-shrink: 0; }
    .toast-icon svg { width: 18px; height: 18px; }
    .toast-body { flex: 1; }
    .toast-close {
      background: none; border: none; cursor: pointer; color: var(--text-3);
      padding: 4px; border-radius: 4px; transition: color var(--transition);
    }
    .toast-close:hover { color: var(--text-1); }
    @keyframes toastIn  { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(60px); } }

    /* ── GLOBAL LOADING SPINNER ───────────────────────────────── */
    .global-spinner {
      width: 28px; height: 28px; border: 3px solid var(--border-2);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-inline {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-3);
    }
    .loading-inline .global-spinner { width: 16px; height: 16px; border-width: 2px; }

    /* ── IMPROVED FOCUS STATES ────────────────────────────────── */
    input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 1px;
      border-color: var(--primary) !important;
    }
    select option {
      background: var(--bg-card-solid);
      color: var(--text-1);
    }
    .btn:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 2px;
    }
    a:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── SKELETON LOADING ─────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card-2) 25%, var(--border) 50%, var(--bg-card-2) 75%);
      background-size: 200% 100%; border-radius: var(--radius-sm);
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton-text { height: 14px; margin-bottom: 8px; border-radius: 4px; }
    .skeleton-text:last-child { width: 60%; }
    .skeleton-circle { border-radius: 50%; }
    .skeleton-card { height: 120px; margin-bottom: 16px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── BREADCRUMB ───────────────────────────────────────────── */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-size: 12px; font-weight: 500; color: var(--text-3);
      margin-bottom: 6px;
    }
    .breadcrumb a {
      color: var(--text-3); text-decoration: none;
      transition: color var(--transition);
    }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb-sep { color: var(--border-2); font-size: 10px; }
    .breadcrumb-current { color: var(--text-1); font-weight: 600; }

    /* ── RISK ALERT BANNER ────────────────────────────────────── */
    .risk-alert-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; border-radius: var(--radius);
      background: var(--danger-bg); border: 1px solid var(--danger-border);
      margin-bottom: 20px; animation: fadeUp 0.45s ease forwards;
    }
    .risk-alert-banner .alert-dismiss {
      margin-left: auto; background: none; border: none;
      color: var(--danger); cursor: pointer; font-size: 18px;
      padding: 4px 8px; border-radius: 4px;
      transition: background var(--transition);
    }
    .risk-alert-banner .alert-dismiss:hover { background: var(--danger-border); }

    /* ── ANIMATIONS ───────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .fade-up { opacity: 0; animation: fadeUp var(--spring) forwards; }
    .fade-up-1 { animation-delay: 0.08s; }
    .fade-up-2 { animation-delay: 0.16s; }
    .fade-up-3 { animation-delay: 0.24s; }
    .fade-up-4 { animation-delay: 0.32s; }
    .fade-up-5 { animation-delay: 0.40s; }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 0 16px; margin: 8px 8px 0; border-radius: 20px; height: 52px; }
      .container { padding: 20px 16px; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .hamburger { display: block; }
      .nav-links {
        display: none; position: fixed; top: 72px; left: 8px; right: 8px;
        background: var(--bg-card-solid); backdrop-filter: blur(20px);
        border: 1px solid var(--border); border-radius: var(--radius);
        flex-direction: column; padding: 12px 16px; gap: 4px;
        box-shadow: var(--shadow-lg); z-index: 95;
      }
      .nav-links.open { display: flex; }
      footer { flex-direction: column; gap: 10px; }
      .page-title { font-size: 26px; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-3.5v3.5h-3V13H7v-3h3.5V6.5h3V10H17v3z"/>
        </svg>
      </div>
      <span class="brand-text">Smart<span>ICU</span></span>
    </a>
    <button class="hamburger" id="navHamburger" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div class="nav-links" id="navLinks">
      <a class="nav-link {% if active_page == 'overview' %}active{% endif %}" href="/"><span class="icon icon-sm"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/></svg></span> Overview</a>
      <a class="nav-link {% if active_page == 'patients' %}active{% endif %}" href="/patients"><span class="icon icon-sm"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></span> Patients</a>
      <a class="nav-link {% if active_page == 'validation' %}active{% endif %}" href="/validation"><span class="icon icon-sm"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></span> Validation</a>
      <a class="nav-link {% if active_page == 'predict' %}active{% endif %}" href="/predict"><span class="icon icon-sm"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg></span> Predict</a>
      <a class="nav-link {% if active_page == 'compare' %}active{% endif %}" href="/compare"><span class="icon icon-sm"><svg viewBox="0 0 24 24"><path d="M10 3H4a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1V4a1 1 0 00-1-1zm0 10H4a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1v-6a1 1 0 00-1-1zm10-10h-6a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1V4a1 1 0 00-1-1zm0 10h-6a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1v-6a1 1 0 00-1-1z"/></svg></span> Compare</a>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>
    <div class="nav-right">
      <div class="status-dot">System Online</div>
      <span class="theme-label" id="themeLabel"><svg width="16" height="16" viewBox="0 0 24 24" fill="var(--text-3)"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg></span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
      <a class="nav-api" href="/docs" target="_blank">API ↗</a>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <span class="footer-copy">Smart ICU Assistant &copy; 2026 &middot; SEM-4 Project</span>
    <div class="footer-tags">
      <span class="footer-tag">MIMIC-III</span>
      <span class="footer-tag">PyTorch</span>
      <span class="footer-tag">XGBoost</span>
      <span class="footer-tag">LightGBM</span>
      <span class="footer-tag">FastAPI</span>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Theme toggle logic with localStorage persistence
    (function() {
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      const label = document.getElementById('themeLabel');
      const sunSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="var(--text-3)"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>';
      const moonSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="var(--text-3)"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>';
      const saved = localStorage.getItem('smarticu-theme');
      if (saved) {
        html.setAttribute('data-theme', saved);
        label.innerHTML = saved === 'dark' ? moonSVG : sunSVG;
      }
      toggle.addEventListener('click', function() {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('smarticu-theme', next);
        label.innerHTML = next === 'dark' ? moonSVG : sunSVG;
      });

      // Mobile hamburger menu
      const hamburger = document.getElementById('navHamburger');
      const navLinks = document.getElementById('navLinks');
      const navOverlay = document.getElementById('navOverlay');
      if (hamburger && navLinks) {
        hamburger.addEventListener('click', function() {
          navLinks.classList.toggle('open');
          if (navOverlay) navOverlay.classList.toggle('open');
        });
        if (navOverlay) {
          navOverlay.addEventListener('click', function() {
            navLinks.classList.remove('open');
            navOverlay.classList.remove('open');
          });
        }
      }
    })();

    // Global toast helper
    window.showToast = function(message, type, duration) {
      type = type || 'info';
      duration = duration || 4000;
      var container = document.getElementById('toastContainer');
      var icons = {
        success: '<svg viewBox="0 0 24 24" fill="var(--success)"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>',
        error:   '<svg viewBox="0 0 24 24" fill="var(--danger)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>',
        warning: '<svg viewBox="0 0 24 24" fill="var(--warning)"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>',
        info:    '<svg viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>'
      };
      var toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.innerHTML = '<span class="toast-icon">' + (icons[type] || icons.info) + '</span>'
        + '<span class="toast-body">' + message + '</span>'
        + '<button class="toast-close" onclick="this.parentElement.classList.add(\'toast-out\');setTimeout(function(){toast.remove()},300)">&times;</button>';
      container.appendChild(toast);
      setTimeout(function() {
        toast.classList.add('toast-out');
        setTimeout(function() { toast.remove(); }, 300);
      }, duration);
    };

    // ── Keyboard shortcuts ───────────────────────────────────
    document.addEventListener('keydown', function(e) {
      // Ctrl+K or / to focus search
      if ((e.ctrlKey && e.key === 'k') || (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))) {
        e.preventDefault();
        var search = document.querySelector('input[name="q"]');
        if (search) { search.focus(); search.select(); }
      }
      // Escape to close mobile menu
      if (e.key === 'Escape') {
        var nl = document.getElementById('navLinks');
        var no = document.getElementById('navOverlay');
        if (nl) nl.classList.remove('open');
        if (no) no.classList.remove('open');
      }
    });

    // ── Session persistence ──────────────────────────────────
    window.SmartICU = window.SmartICU || {};
    SmartICU.saveRecent = function(icustayId, label) {
      var recent = JSON.parse(localStorage.getItem('smarticu-recent') || '[]');
      recent = recent.filter(function(r) { return r.id !== icustayId; });
      recent.unshift({ id: icustayId, label: label || ('#' + icustayId), ts: Date.now() });
      if (recent.length > 10) recent = recent.slice(0, 10);
      localStorage.setItem('smarticu-recent', JSON.stringify(recent));
    };
    SmartICU.getRecent = function() {
      return JSON.parse(localStorage.getItem('smarticu-recent') || '[]');
    };
    SmartICU.saveFilter = function(key, val) {
      var filters = JSON.parse(localStorage.getItem('smarticu-filters') || '{}');
      filters[key] = val;
      localStorage.setItem('smarticu-filters', JSON.stringify(filters));
    };
    SmartICU.getFilter = function(key) {
      var filters = JSON.parse(localStorage.getItem('smarticu-filters') || '{}');
      return filters[key] || '';
    };
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
